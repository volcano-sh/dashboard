name: Build

on:
    push:
        branches: ["*"]
    pull_request:
        branches: ["*"]

jobs:
    app-build:
        name: Next.js Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build application
              run: npm run build

    helm-build:
        name: Helm Chart
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Helm
              uses: azure/setup-helm@v4

            - name: Lint Helm chart
              run: helm lint helm/volcano-dashboard

            - name: Render Helm chart
              run: helm template volcano-dashboard helm/volcano-dashboard --namespace volcano-system

    docker-build:
        name: Docker Image
        runs-on: ubuntu-latest
        needs: [app-build, helm-build]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker image
              run: npm run build:image
