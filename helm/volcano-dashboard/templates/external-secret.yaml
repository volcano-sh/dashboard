{{- if .Values.externalSecret.enabled }}
{{- if .Values.config.existingSecret }}
{{- fail "config.existingSecret and externalSecret.enabled cannot both be set" }}
{{- end }}
{{- if not .Values.externalSecret.secretStoreRef.name }}
{{- fail "externalSecret.secretStoreRef.name is required when externalSecret.enabled=true" }}
{{- end }}
apiVersion: {{ .Values.externalSecret.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ default (printf "%s-config" (include "volcano-dashboard.fullname" .)) .Values.externalSecret.name | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "volcano-dashboard.namespace" . }}
  labels:
    {{- include "volcano-dashboard.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind | quote }}
  target:
    name: {{ include "volcano-dashboard.configSecretName" . }}
    creationPolicy: {{ .Values.externalSecret.target.creationPolicy | quote }}
    deletionPolicy: {{ .Values.externalSecret.target.deletionPolicy | quote }}
    template:
      engineVersion: {{ .Values.externalSecret.target.template.engineVersion | quote }}
      type: {{ .Values.externalSecret.target.template.type | quote }}
      data:
        {{ .Values.config.secretKey }}: |
{{ .Values.config.data | toYaml | indent 10 }}
  {{- with .Values.externalSecret.data }}
  data:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.externalSecret.dataFrom }}
  dataFrom:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
