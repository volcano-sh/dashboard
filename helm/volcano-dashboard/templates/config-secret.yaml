{{- if not .Values.config.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "volcano-dashboard.configSecretName" . }}
  namespace: {{ include "volcano-dashboard.namespace" . }}
  labels:
    {{- include "volcano-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.config.secretKey }}: |
{{ .Values.config.data | toYaml | indent 4 }}
{{- end }}
