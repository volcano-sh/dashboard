{{- if and .Values.auth.config (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "volcano-dashboard.authSecretName" . }}
  namespace: {{ include "volcano-dashboard.namespace" . }}
  labels:
    {{- include "volcano-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.configSecretKey }}: |
{{ .Values.auth.config | indent 4 }}
{{- end }}
