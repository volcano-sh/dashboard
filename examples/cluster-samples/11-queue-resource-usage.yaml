    weight: 2
    reclaimable: true
    capability:
        cpu: "16"
        memory: "64Gi"
        nvidia.com/gpu: "2"
    deserved:
        cpu: "8"
        memory: "32Gi"
        nvidia.com/gpu: "1"
    guarantee:
        resource:
            cpu: "4"
            memory: "16Gi"
status:
    state: Open
    allocated:
        cpu: "6"
        memory: "24Gi"
        nvidia.com/gpu: "1"
---
