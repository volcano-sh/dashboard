# Queue resource usage scenarios for validating the dashboard resource bars.
#
# The spec fields are normal Volcano Queue configuration. The status fields are
# included so API fixtures or clusters that preserve applied status can render
# deterministic usage states in the Queues page. In a live Volcano cluster, the
# controller may overwrite status based on real workload allocations.
---
apiVersion: scheduling.volcano.sh/v1beta1
kind: Queue
metadata:
    name: demo-usage-root
    labels:
        demo.volcano.sh/sample: "true"
        demo.volcano.sh/purpose: resource-usage
        demo.volcano.sh/usage-scenario: root
spec:
    weight: 10
    reclaimable: true
    capability:
        cpu: "128"
        memory: "2Ti"
        nvidia.com/gpu: "16"
    deserved:
        cpu: "64"
        memory: "1Ti"
        nvidia.com/gpu: "8"
    guarantee:
        resource:
            cpu: "32"
            memory: "384Gi"
            nvidia.com/gpu: "6"
status:
    state: Open
    allocated:
        cpu: "40"
        memory: "512Gi"
        nvidia.com/gpu: "5"
---
apiVersion: scheduling.volcano.sh/v1beta1
kind: Queue
metadata:
    name: demo-usage-idle
    labels:
        demo.volcano.sh/sample: "true"
        demo.volcano.sh/purpose: resource-usage
        demo.volcano.sh/usage-scenario: idle
spec:
    parent: demo-usage-root
    weight: 1
    reclaimable: true
    capability:
        cpu: "8"
        memory: "32Gi"
        nvidia.com/gpu: "1"
    deserved:
        cpu: "4"
        memory: "16Gi"
        nvidia.com/gpu: "1"
    guarantee:
        resource:
            cpu: "2"
            memory: "8Gi"
status:
    state: Open
    allocated:
        cpu: "0"
        memory: "0"
        nvidia.com/gpu: "0"
---
apiVersion: scheduling.volcano.sh/v1beta1
kind: Queue
