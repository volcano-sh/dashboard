        nvidia.com/gpu: "2"
    deserved:
        cpu: "10"
        memory: "40Gi"
        nvidia.com/gpu: "1"
    guarantee:
        resource:
            cpu: "4"
            memory: "16Gi"
status:
    state: Open
    allocated:
        cpu: "4"
        memory: "16Gi"
        nvidia.com/gpu: "0"
---
