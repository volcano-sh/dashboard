apiVersion: scheduling.volcano.sh/v1beta1
kind: Queue
metadata:
    name: demo-root
    labels:
        demo.volcano.sh/sample: "true"
spec:
    weight: 10
    reclaimable: true
    capability:
        cpu: "32"
        memory: "128Gi"
    deserved:
        cpu: "16"
        memory: "64Gi"
    guarantee:
        resource:
            cpu: "16"
            memory: "64Gi"
---
apiVersion: scheduling.volcano.sh/v1beta1
kind: Queue
metadata:
    name: demo-prod
    labels:
        demo.volcano.sh/sample: "true"
spec:
    parent: demo-root
    weight: 4
    reclaimable: true
    capability:
        cpu: "16"
        memory: "64Gi"
    deserved:
        cpu: "8"
        memory: "32Gi"
    guarantee:
        resource:
            cpu: "8"
            memory: "32Gi"
---
apiVersion: scheduling.volcano.sh/v1beta1
