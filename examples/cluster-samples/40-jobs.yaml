apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
    name: demo-job-prod
    namespace: volcano-demo
    labels:
        demo.volcano.sh/sample: "true"
spec:
    minAvailable: 1
    queue: demo-prod-team-b
    schedulerName: volcano
    maxRetry: 1
    tasks:
        - name: worker
          replicas: 1
          template:
              spec:
                  restartPolicy: Never
                  containers:
                      - name: worker
                        image: busybox:1.36.1
                        command:
                            - sh
                            - -c
                            - echo "demo-job-prod-team-b running"; sleep 86400
                        resources:
                            requests:
                                cpu: 50m
                                memory: 64Mi
---
