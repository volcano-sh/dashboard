apiVersion: v1
kind: Pod
metadata:
    name: demo-serving-0
    namespace: volcano-demo
    labels:
        app: demo-serving
        demo.volcano.sh/sample: "true"
    annotations:
        scheduling.volcano.sh/group-name: demo-serving
        scheduling.volcano.sh/queue-name: demo-prod
spec:
    schedulerName: volcano
    containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
              requests:
                  cpu: 50m
                  memory: 32Mi
---
