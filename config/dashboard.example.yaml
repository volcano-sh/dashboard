# Volcano Dashboard unified backend configuration.
#
# Use this file for local development:
#   DASHBOARD_CONFIG_FILE=config/dashboard.example.yaml npm run dev
#
# For Helm deployments, create a Secret from a customized copy:
#   kubectl create secret generic volcano-dashboard-config \
#     --namespace volcano-system \
#     --from-file=dashboard.yaml=./dashboard.yaml

schedulerConfig:
    namespace: volcano-system
    name: volcano-scheduler-configmap
    key: ""

access:
    # Supported values: read-write, read-only.
    # read-only allows direct dashboard access without auth.
    mode: read-only

auth:
    mode: local-sso
    jwt:
        issuer: volcano-dashboard
        secret: secure-salt-value-123
        expiresIn: 8h
        rememberExpiresIn: 30d

    # Default development account is admin/admin.
    # password_hash must be bcrypt.
    users:
        - username: admin
          display_name: Administrator
          password_hash: "$2b$12$LPJUlguhAzbmjP3CrGaPhuLUkBbi8GFKrIOGLBxJJgL2zSn00qoO."
          tenants: [ "adak8s", "squidflow" ]
          is_admin: true

    sso:
        provider_name: Keycloak
        issuer_url: http://localhost:8080/realms/adak8s
        client_id: squidflow-backend
        client_secret: qiesogMQypSjhmxaYelevxlhJWkr0H3O
        redirect_uri: http://localhost:3000/sso/callback
        scopes: [ "openid", "profile", "email", "offline_access" ]
        jwks_cache_ttl: 10m

        # Reserved for future RBAC / tenant mapping support.
        group_mappings:
            - match: adak8s
              add_tenants: [ "*" ]
              is_admin: true
